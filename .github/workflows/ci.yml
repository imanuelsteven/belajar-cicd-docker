# Nama workflow (muncul di UI GitHub)
name: Belajar CI/CD Pipeline

# Kapan workflow ini dijalankan?
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

  # Atau schedule: setiap hari jam 1 pagi
  # schedule:
  #   - cron: "0 1 * * *"

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Ucapin salam
        run: echo "Halo, ini pipeline pertamaku!"

      - name: Cek waktu sekarang
        run: date

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run linter
        run: flake8 app.py --max-line-length=120
